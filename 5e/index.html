<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mathématiques 5e</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f8;
}

header {
    background: #1a73e8;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    width: 90%;
    margin: auto;
}

.chapter {
    background: white;
    margin: 15px 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.chapter-title {
    padding: 15px;
    cursor: pointer;
    background: #e8f0fe;
    font-weight: bold;
}

.chapter-content {
    display: none;
    padding: 15px;
}

.btn {
    display: inline-block;
    margin: 5px;
    padding: 8px 12px;
    background: #1a73e8;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<header>
    <h1>📘 Mathématiques 5e</h1>
    <a href="../index.html" style="color:white;">⬅ Retour accueil</a>
</header>

<div class="container">

    <div class="chapter">
        <div class="chapter-title" onclick="toggleChapter(this)">
            Chapitre 1 – Nombres relatifs
        </div>

        <div class="chapter-content">

            <a class="btn" href="pdf/ch1_cours.pdf">📘 Cours</a>
            <a class="btn" href="pdf/ch1_exercices.pdf">📝 Exercices</a>

            <button class="btn" onclick="toggleCorrige('c1')">✅ Corrigé</button>
            <div id="c1" style="display:none;">
                <a class="btn" href="pdf/ch1_corrige.pdf">Voir corrigé</a>
            </div>

            <button class="btn" onclick="toggleVideo('v1')">🎬 Vidéo</button>
            <div id="v1" style="display:none;">
                <video width="600" controls>
                    <source src="videos/ch1.mp4" type="video/mp4">
                </video>
            </div>

        </div>
    </div>

</div>

<script>
function toggleChapter(el) {
    const content = el.nextElementSibling;
    content.style.display = (content.style.display === "block") ? "none" : "block";
}

function toggleCorrige(id) {
    const el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "none";
    el.style.display = (el.style.display === "none") ? "block" : "none";
}

function toggleVideo(id) {
    const el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
